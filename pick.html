<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピッキングシェルフ - ピッキングモード</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
    <style>
        .sidebar {
            width: 300px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .main-list {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #f8fafc;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-done {
            background: #dcfce7;
            color: #166534;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <header>
        <div style="display:flex; align-items:center; gap:1rem;">
            <h2 style="margin:0;">🛒 ピッキングモード</h2>
            <select id="userSelect" class="user-select" style="margin-right:0.5rem;">
                <option value="user1">User 1</option>
                <option value="user2">User 2</option>
                <option value="user3">User 3</option>
                <option value="user4">User 4</option>
            </select>
            <span id="sessionDisplay"
                style="font-size:0.8rem; background:#f1f5f9; padding:0.25rem 0.75rem; border-radius:99px; font-weight:600;"></span>
        </div>
        <div style="display:flex; gap:0.5rem;">
            <button class="btn btn-outline nav-link" data-page="index.html">🏠 HOME</button>
            <button class="btn btn-outline nav-link" data-page="wall.html">📱 Wall</button>
            <button class="btn btn-outline nav-link" data-page="inject.html">投入へ ➔</button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3 style="margin:0; font-size:1rem;">ピッキング開始</h3>
            <input type="text" id="listIdInput" placeholder="ピッキングNo.を入力..." autofocus>
            <label style="display:flex; align-items:center; gap:0.5rem; font-weight:700; font-size:0.9rem;">
                <input type="checkbox" id="pickModeToggle" style="width:auto;"> 検品モード
            </label>
            <label style="display:flex; align-items:center; gap:0.5rem; font-weight:700; font-size:0.9rem;">
                <input type="checkbox" id="quantityVerificationToggle" style="width:auto;"> 数量検品
            </label>
            <div id="janInputWrap" class="hidden">
                <input type="text" id="janInput" placeholder="JANをスキャン...">
                <div id="janFeedback" class="pick-feedback"></div>
            </div>

            <button id="resetPickingBtn" class="btn btn-outline"
                style="width:100%; border-color: var(--danger); color: var(--danger); font-size: 0.8rem; margin-top: 0.5rem;">
                ✕ ピッキングをリセット
            </button>
        </aside>

        <main class="main-list">
            <h2 id="currentListTitle" style="margin-top:0; font-size:1.5rem; margin-bottom:1.5rem;">ピッキングNo.を入力してください
            </h2>
            <div id="pickProgressCard" class="card hidden" style="margin-bottom:1rem; padding:0.75rem 1rem;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                    <span style="font-weight:700;">CSV全体進捗</span>
                    <span id="pickProgressText" style="font-weight:800;">0 / 0</span>
                </div>
                <div style="height:8px; background:#e2e8f0; border-radius:999px; overflow:hidden;">
                    <div id="pickProgressFill" style="height:100%; width:0%; background:#2563eb; transition:width .2s ease;"></div>
                </div>
            </div>
            <div class="card" style="padding:0; overflow:hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>JAN</th>
                            <th>数量</th>
                            <th>ロケーション</th>
                            <th>状態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="pickTable">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/state-manager.js"></script>
    <script src="js/navigation-guard.js"></script>
    <script src="js/audio-manager.js"></script>
    <script src="js/pages/pick.js"></script>
</body>

</html>
