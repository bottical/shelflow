<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シェルフロー - 棚型ピッキング支援システム</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
</head>

<body
    style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; height: auto; overflow-y: auto !important; gap: 3rem; padding: 2rem;">

    <div style="text-align: center;">
        <h1 style="font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 0; letter-spacing: -0.05em;">
            シェルフロー</h1>
        <p style="color: var(--text-muted); font-size: 1.2rem; margin: 0.5rem 0 0 0;">SHELFLOW for Total & Single Picking</p>
    </div>

    <div id="loader" style="display: flex; align-items: center; justify-content: center; height: 100px;">
        <div
            style="width: 32px; height: 32px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite;">
        </div>
    </div>

    <div id="appContent" class="hidden"
        style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div id="loginSection" class="card hidden"
            style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 1rem;">
            <h2 style="margin:0; text-align:center;">Login / Signup</h2>
            <input type="email" id="emailInput" placeholder="メールアドレス">
            <input type="password" id="passInput" placeholder="パスワード">
            <div style="display:grid; grid-template-columns: 1fr ">
                <button class="btn btn-primary" onclick="handleAuth('LOGIN')">ログイン</button>
                <!-- <button class="btn btn-outline" onclick="handleAuth('SIGNUP')">新規登録</button> -->
            </div>
        </div>

        <div id="menuSection" class="hidden"
            style="display: flex; flex-direction: column; align-items: center; gap: 2rem; width: 100%;">
            <div class="card"
                style="display: flex; align-items: center; gap: 1rem; width: 100%; max-width: 400px; padding: 1rem 1.5rem;">
                <div class="icon" style="font-size:1.5rem;">👤</div>
                <div style="flex:1;">
                    <div style="font-size:0.75rem; color:var(--text-muted); font-weight:800;">SIGNED IN AS</div>
                    <div id="userEmail" style="font-weight:700;"></div>
                </div>
                <button class="btn btn-outline" style="padding:0.4rem 0.8rem; font-size:0.7rem;"
                    onclick="handleAuth('LOGOUT')">ログアウト</button>
            </div>

            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; width: 100%; max-width: 900px;">
                <div class="card menu-item" data-page="inject.html">
                    <div class="icon">📦</div>
                    <h3>投入モード</h3>
                    <p>JANスキャン・商品投入</p>
                </div>
                <div class="card menu-item" data-page="wall.html">
                    <div class="icon">📱</div>
                    <h3>モバイルウォール</h3>
                    <p>間口表示・分割設定</p>
                </div>
                <div class="card menu-item" data-page="pick.html">
                    <div class="icon">🛒</div>
                    <h3>ピッキング</h3>
                    <p>商品出庫・進捗管理</p>
                </div>
            </div>

            <button id="resetBtn" class="btn btn-outline" style="color: var(--danger); border-color: transparent;">
                🔄 データをリセット
            </button>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .menu-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .menu-item .icon {
            font-size: 2.5rem;
            background: #f1f5f9;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
        }

        .menu-item h3 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 800;
        }

        .menu-item p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/state-manager.js"></script>
    <script src="js/pages/portal.js"></script>
</body>

</html>
